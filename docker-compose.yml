services:
  postgres:
    image: postgres:16-alpine
    container_name: cards-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cards_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cards_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cards_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cards_postgres_data:
