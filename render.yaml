services:
  - type: web
    name: cards-backend
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: cd backend && npm ci --include=dev && npm run build
    startCommand: cd backend && node dist/backend/src/db/migrate.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cards-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_SSL
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        value: https://cards-frontend-mw09.onrender.com

  - type: web
    name: cards-frontend
    runtime: static
    buildCommand: cd frontend && npm ci --include=dev && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    envVars:
      - key: VITE_API_URL
        value: https://cards-backend-75st.onrender.com
      - key: VITE_BACKEND_URL
        value: https://cards-backend-75st.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: cards-postgres
    plan: free
    databaseName: cards_game
    user: cards_user
